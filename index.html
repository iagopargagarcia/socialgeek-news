<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socialgeek News</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0f0f0;
      --text-muted: #888;
      --text-dim: #555;
      --accent: #e8ff47;
      --accent-dim: rgba(232,255,71,0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; }
    body { min-height: 100vh; }

    .app { max-width: 720px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

    /* HEADER */
    .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 3rem; }
    .logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); display: flex; align-items: baseline; gap: 10px; }
    .logo span { color: var(--accent); }
    .logo-by { font-size: 12px; font-weight: 400; color: var(--text-dim); letter-spacing: 0.02em; font-family: 'DM Sans', sans-serif; }
    .header-tag { font-size: 12px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }

    /* SCREEN TRANSITIONS */
    .screen { display: none; animation: fadeIn 0.2s ease; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* SECTION LABEL */
    .section-label {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 1.25rem;
    }

    /* PLATFORM GRID */
    .platform-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 2.5rem; }

    .platform-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      display: flex; flex-direction: column; gap: 10px;
      position: relative; overflow: hidden;
    }
    .platform-card::before {
      content: ''; position: absolute; inset: 0;
      background: var(--accent-dim); opacity: 0;
      transition: opacity 0.15s;
    }
    .platform-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .platform-card:hover::before { opacity: 1; }
    .platform-card.selected { border-color: var(--accent); }
    .platform-card.selected::before { opacity: 1; }

    .platform-icon {
      width: 38px; height: 38px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2);
    }
    .platform-icon svg { width: 20px; height: 20px; }
    .platform-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); }
    .platform-count { font-size: 11px; color: var(--text-muted); }

    /* BACK + BREADCRUMB */
    .nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .back-btn {
      background: none; border: none; color: var(--text-muted); font-size: 13px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 6px; padding: 0;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text); }
    .breadcrumb { font-size: 13px; color: var(--text-dim); }
    .breadcrumb strong { color: var(--accent); font-weight: 500; }

    /* FILTERS */
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 2rem; }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 7px 16px;
      font-size: 13px; color: var(--text-muted);
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0d0d; font-weight: 500; }

    /* RESULTS */
    .results-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 1.25rem; letter-spacing: 0.04em; }

    .news-list { display: flex; flex-direction: column; gap: 1px; }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color 0.15s;
      margin-bottom: 8px;
    }
    .news-card:hover { border-color: var(--border-hover); }

    .news-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .news-date { font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; }
    .news-badge {
      font-size: 10px; padding: 3px 8px; border-radius: 99px;
      font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .news-title {
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600;
      color: var(--text); line-height: 1.4; margin-bottom: 6px;
    }
    .news-nota { font-size: 13px; color: var(--text-muted); line-height: 1.65; margin-bottom: 12px; }
    .news-link {
      font-size: 12px; color: var(--accent); text-decoration: none;
      letter-spacing: 0.03em; transition: opacity 0.15s;
    }
    .news-link:hover { opacity: 0.7; }

    /* STATES */
    .empty-state, .loading-state, .error-state {
      text-align: center; padding: 4rem 1rem;
      color: var(--text-dim); font-size: 14px; line-height: 1.7;
    }
    .error-state { color: #e05555; }

    /* CONFIG BANNER */
    .config-banner {
      background: var(--surface);
      border: 1px dashed var(--border-hover);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      font-size: 13px; color: var(--text-muted); line-height: 1.7;
    }
    .config-banner code {
      background: var(--surface2); padding: 2px 6px; border-radius: 4px;
      font-size: 12px; color: var(--accent); font-family: monospace;
    }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="logo">Socialgeek<span>.</span>News <span class="logo-by">by Iago Parga</span></div>
    <div class="header-tag">Monitor de redes</div>
  </header>

  <!-- ============================================================
       CONFIGURA AQUÍ TU GOOGLE SHEET
       1. Abre tu Google Sheet
       2. Archivo → Compartir → Publicar en la web
       3. Selecciona la hoja, formato CSV, y copia la URL
       4. Pégala abajo en SHEET_CSV_URL
       ============================================================ -->
  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThCt_IKb2w8rajakaGjtxaRcQIWZS-zq4GWfzT-K_t9N47I29zjGdqpXYAYbDAyBEGVT-gtLmnsq7R/pub?gid=0&single=true&output=csv";

    // Columnas esperadas en tu hoja (exactamente como las tienes):
    // Plataforma | Título | Nota | URL | Fecha
    // La columna Fecha debe tener formato: DD/MM/AAAA o AAAA-MM-DD

    const PLATFORMS = [
      { id: 'Instagram',  aliases: ['instagram'],           color: '#E1306C', bg: 'rgba(225,48,108,0.15)',  text: '#f9a8c9' },
      { id: 'X / Twitter', aliases: ['x','twitter','x / twitter','twitter / x'], color: '#1DA1F2', bg: 'rgba(29,161,242,0.15)',  text: '#7dd3fc' },
      { id: 'TikTok',     aliases: ['tiktok'],              color: '#aaaaaa', bg: 'rgba(180,180,180,0.12)', text: '#cccccc' },
      { id: 'Facebook',   aliases: ['facebook'],            color: '#1877F2', bg: 'rgba(24,119,242,0.15)',  text: '#93c5fd' },
      { id: 'LinkedIn',   aliases: ['linkedin'],            color: '#0A66C2', bg: 'rgba(10,102,194,0.15)',  text: '#7fb3e8' },
      { id: 'Meta',       aliases: ['meta'],                color: '#0082FB', bg: 'rgba(0,130,251,0.15)',   text: '#93c5fd' },
      { id: 'Reddit',     aliases: ['reddit'],              color: '#FF4500', bg: 'rgba(255,69,0,0.15)',    text: '#fca47a' },
      { id: 'Pinterest',  aliases: ['pinterest'],           color: '#E60023', bg: 'rgba(230,0,35,0.15)',   text: '#fca5a5' },
      { id: 'Snapchat',   aliases: ['snapchat'],            color: '#FFFC00', bg: 'rgba(255,252,0,0.12)',   text: '#d4b800' },
    ];
  </script>

  <!-- SCREEN 1 -->
  <div class="screen active" id="screen-1">
    <div id="config-notice"></div>
    <div class="section-label">Selecciona una plataforma</div>
    <div class="platform-grid" id="platform-grid">
      <div class="loading-state">Cargando datos…</div>
    </div>
  </div>

  <!-- SCREEN 2 -->
  <div class="screen" id="screen-2">
    <div class="nav-row">
      <button class="back-btn" onclick="goBack()">← Volver</button>
      <div class="breadcrumb"><strong id="bc-platform"></strong> · <span id="bc-filter">7 días</span></div>
    </div>
    <div class="section-label">Filtrar por período</div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter(7,  this)">Últimos 7 días</button>
      <button class="filter-btn"        onclick="setFilter(14, this)">Últimos 14 días</button>
      <button class="filter-btn"        onclick="setFilter(30, this)">Último mes</button>
      <button class="filter-btn"        onclick="setFilter(999,this)">Todo</button>
    </div>
    <div class="results-meta" id="results-meta"></div>
    <div class="news-list" id="news-list"></div>
  </div>

</div>

<script>
  let allNews = [];
  let selectedPlatform = null;
  let currentDays = 7;

  // ---------- PARSEO CSV ----------
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());
    return lines.slice(1).map(line => {
      const cols = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|(?<=,)$|^(?=,))/g) || [];
      const obj = {};
      headers.forEach((h, i) => {
        obj[h] = (cols[i] || '').trim().replace(/^"|"$/g, '');
      });
      return obj;
    }).filter(r => r.plataforma || r.titulo);
  }

  function parseDate(str) {
    if (!str) return null;
    // DD/MM/AAAA
    const dmy = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (dmy) return new Date(+dmy[3], +dmy[2]-1, +dmy[1]);
    // AAAA-MM-DD
    const ymd = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (ymd) return new Date(+ymd[1], +ymd[2]-1, +ymd[3]);
    return new Date(str);
  }

  function formatDate(d) {
    if (!d) return '';
    return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // ---------- CARGA ----------
  async function loadData() {
    if (SHEET_CSV_URL.startsWith('TU_URL')) {
      loadSampleData();
      document.getElementById('config-notice').innerHTML = `
        <div class="config-banner">
          <strong>Modo demo</strong> — estás viendo datos de ejemplo.<br>
          Edita <code>SHEET_CSV_URL</code> en el archivo <code>index.html</code> con la URL CSV de tu Google Sheet para ver tus noticias reales.
        </div>`;
      return;
    }
    try {
      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error('No se pudo cargar el archivo');
      const text = await res.text();
      allNews = parseCSV(text).map(r => ({
        plataforma: r.plataforma || r['plataforma'] || '',
        titulo:     r['título'] || r['titulo'] || r.title || '',
        nota:       r.nota || r.note || r.resumen || '',
        url:        r.url || r.link || r.enlace || '',
        fecha:      parseDate(r.fecha || r.date || r['fecha'] || '')
      }));
      buildPlatformGrid();
    } catch (e) {
      document.getElementById('platform-grid').innerHTML =
        `<div class="error-state">Error al cargar los datos.<br>${e.message}</div>`;
    }
  }

  function loadSampleData() {
    const today = new Date();
    const ago = n => { const d = new Date(today); d.setDate(d.getDate()-n); return d; };
    allNews = [
      { plataforma:'Instagram', titulo:'Instagram prueba herramientas de edición avanzada para Reels', nota:'La plataforma busca competir con CapCut ofreciendo filtros y transiciones dentro de la propia app.', url:'#', fecha:ago(2) },
      { plataforma:'Instagram', titulo:'El algoritmo penaliza el contenido reposteado sin valor añadido', nota:'Un cambio en las directrices premia el contenido original frente a los reposteos directos.', url:'#', fecha:ago(5) },
      { plataforma:'Instagram', titulo:'Monetización de Reels llega a España y más países europeos', nota:'Los creadores de la UE ya pueden acceder a las bonificaciones por reproducciones de Reels.', url:'#', fecha:ago(18) },
      { plataforma:'Twitter',   titulo:'X cambia los requisitos de verificación para cuentas y organizaciones', nota:'La compañía diferencia ahora entre verificación de persona y de entidad corporativa.', url:'#', fecha:ago(1) },
      { plataforma:'Twitter',   titulo:'Las notas de la comunidad se amplían a contenido de salud y ciencia', nota:'El sistema de verificación colaborativa ahora cubre nuevas categorías temáticas.', url:'#', fecha:ago(9) },
      { plataforma:'Twitter',   titulo:'X prueba artículos de larga duración para suscriptores Premium', nota:'Los creadores podrán publicar contenido sin límite de caracteres directamente en la plataforma.', url:'#', fecha:ago(25) },
      { plataforma:'TikTok',    titulo:'TikTok Shop se lanza oficialmente en España', nota:'El comercio integrado permite vender productos directamente desde los vídeos sin salir de la app.', url:'#', fecha:ago(3) },
      { plataforma:'TikTok',    titulo:'El límite de duración de vídeos sube a 20 minutos', nota:'Siguiendo la tendencia hacia contenido largo, la plataforma amplía el tope para todos los creadores.', url:'#', fecha:ago(22) },
      { plataforma:'Facebook',  titulo:'Facebook Marketplace incorpora pagos integrados en Europa', nota:'Los usuarios podrán completar transacciones sin salir de la aplicación.', url:'#', fecha:ago(4) },
      { plataforma:'Facebook',  titulo:'Meta actualiza normas de privacidad en grupos de Facebook', nota:'Los administradores tendrán más control sobre quién puede ver el contenido de sus comunidades.', url:'#', fecha:ago(15) },
      { plataforma:'LinkedIn',  titulo:'LinkedIn lanza IA para optimizar perfiles profesionales', nota:'La nueva función analiza el perfil y sugiere mejoras basadas en ofertas de empleo relevantes.', url:'#', fecha:ago(6) },
      { plataforma:'LinkedIn',  titulo:'Los artículos colaborativos superan los 10 millones de contribuciones', nota:'La función de conocimiento colectivo se consolida como una de las más activas de la plataforma.', url:'#', fecha:ago(29) },
    ];
    buildPlatformGrid();
  }

  // ---------- PANTALLA 1 ----------
  function buildPlatformGrid() {
    const grid = document.getElementById('platform-grid');
    grid.innerHTML = '';
    PLATFORMS.forEach(p => {
      const count = allNews.filter(n => p.aliases.includes(n.plataforma.toLowerCase())).length;
      const card = document.createElement('div');
      card.className = 'platform-card';
      card.innerHTML = `
        <div class="platform-icon">${platformIcon(p.id)}</div>
        <div>
          <div class="platform-name">${p.id}</div>
          <div class="platform-count">${count} noticia${count !== 1 ? 's' : ''}</div>
        </div>`;
      card.onclick = () => { selectedPlatform = p; goToScreen2(); };
      grid.appendChild(card);
    });
  }

  // ---------- PANTALLA 2 ----------
  function goToScreen2() {
    document.getElementById('bc-platform').textContent = selectedPlatform.id;
    currentDays = 7;
    document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    document.getElementById('bc-filter').textContent = '7 días';
    document.getElementById('screen-1').classList.remove('active');
    document.getElementById('screen-2').classList.add('active');
    renderNews();
  }

  function goBack() {
    document.getElementById('screen-2').classList.remove('active');
    document.getElementById('screen-1').classList.add('active');
  }

  function setFilter(days, btn) {
    currentDays = days;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const labels = {7:'7 días', 14:'14 días', 30:'último mes', 999:'todo'};
    document.getElementById('bc-filter').textContent = labels[days];
    renderNews();
  }

  function renderNews() {
    const list = document.getElementById('news-list');
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - currentDays);
    const p = selectedPlatform;

    const filtered = allNews
      .filter(n => p.aliases.includes(n.plataforma.toLowerCase()))
      .filter(n => currentDays === 999 || !n.fecha || n.fecha >= cutoff)
      .sort((a,b) => (b.fecha||0) - (a.fecha||0));

    document.getElementById('results-meta').textContent =
      `${filtered.length} noticia${filtered.length !== 1 ? 's' : ''} encontrada${filtered.length !== 1 ? 's' : ''}`;

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state">Sin noticias en este período.<br>Prueba con un rango mayor.</div>`;
      return;
    }

    list.innerHTML = '';
    filtered.forEach(n => {
      const card = document.createElement('div');
      card.className = 'news-card';
      card.innerHTML = `
        <div class="news-top">
          <span class="news-badge" style="background:${p.bg};color:${p.text}">${p.id}</span>
          ${n.fecha ? `<span class="news-date">${formatDate(n.fecha)}</span>` : ''}
        </div>
        <div class="news-title">${n.titulo}</div>
        ${n.nota ? `<div class="news-nota">${n.nota}</div>` : ''}
        ${n.url && n.url !== '#' ? `<a class="news-link" href="${n.url}" target="_blank">Leer noticia →</a>` : ''}
      `;
      list.appendChild(card);
    });
  }

  function platformIcon(id) {
    const icons = {
      Instagram:    `<svg viewBox="0 0 24 24" fill="none" stroke="#E1306C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="#E1306C" stroke="none"/></svg>`,
      'X / Twitter':`<svg viewBox="0 0 24 24" fill="#1DA1F2"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
      TikTok:       `<svg viewBox="0 0 24 24" fill="#aaa"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V9a8.16 8.16 0 004.77 1.52V7.05a4.85 4.85 0 01-1-.36z"/></svg>`,
      Facebook:     `<svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`,
